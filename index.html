<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0A0908"/>
<title>Bach · Music Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.js"></script>
<style>
:root {
  --bg:          #0A0908;
  --bg-warm:     #0F0D0A;
  --ink:         #E8D4A2;
  --ink-dim:     rgba(232,212,162,0.4);
  --ink-faint:   rgba(232,212,162,0.10);
  --gold:        #C9A961;
  --safe-top:    env(safe-area-inset-top,0);
  --safe-bottom: env(safe-area-inset-bottom,0);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:'EB Garamond',serif;height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
body{
  display:flex;flex-direction:column;
  height:100vh;height:100dvh;
  background:radial-gradient(ellipse at center,var(--bg-warm) 0%,var(--bg) 72%);
  padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);
}
header{
  padding:26px 48px 18px;display:flex;align-items:baseline;gap:22px;
  flex-shrink:0;min-height:66px;
}
#work-title{
  font-size:26px;font-style:italic;font-weight:400;letter-spacing:0.3px;
  opacity:0.88;transition:opacity 0.35s ease;flex:1;line-height:1.2;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
#work-title.loading{opacity:0.28;}
#work-meta{
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--ink-dim);font-style:normal;flex-shrink:0;font-variant-numeric:tabular-nums;
}
.palette-wrapper{position:relative;flex-shrink:0;align-self:center;}
#palette-toggle{
  background:transparent;border:1px solid var(--ink-faint);width:36px;height:20px;
  border-radius:3px;cursor:pointer;padding:0;display:flex;overflow:hidden;
  transition:border-color 0.25s;-webkit-appearance:none;
}
#palette-toggle:hover{border-color:var(--gold);}
#palette-toggle .strip{flex:1;height:100%;}
#palette-menu{
  position:absolute;top:calc(100% + 10px);right:0;background:var(--bg-warm);
  border:1px solid var(--ink-faint);border-radius:4px;padding:8px;
  display:none;flex-direction:column;gap:2px;z-index:100;min-width:200px;
  box-shadow:0 12px 40px rgba(0,0,0,0.75);
}
#palette-menu.open{display:flex;}
.palette-option{
  display:flex;align-items:center;gap:12px;background:transparent;
  border:1px solid transparent;padding:8px 10px;border-radius:3px;cursor:pointer;
  color:var(--ink-dim);font-family:'EB Garamond',serif;font-size:13px;
  font-style:italic;letter-spacing:0.3px;transition:all 0.2s;
  -webkit-appearance:none;text-align:left;width:100%;
}
.palette-option:hover{color:var(--ink);background:rgba(232,212,162,0.04);}
.palette-option.active{color:var(--gold);}
.palette-option.active::after{content:"·";margin-left:auto;color:var(--gold);font-size:18px;line-height:1;}
.palette-swatches{display:flex;width:48px;height:14px;border-radius:2px;overflow:hidden;flex-shrink:0;}
.palette-swatches .strip{flex:1;}
#visualizer{flex:1;width:100%;display:block;cursor:default;min-height:0;touch-action:none;}
#controls{
  padding:14px 48px 10px;display:flex;align-items:center;gap:22px;
  flex-shrink:0;flex-wrap:wrap;
}
.ctrl-group{display:flex;align-items:center;gap:10px;}
.ctrl-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-dim);}
select{
  font-family:'EB Garamond',serif;font-size:14px;font-style:italic;
  color:var(--ink);background-color:transparent;
  border:none;border-bottom:1px solid var(--ink-faint);
  padding:5px 22px 5px 2px;appearance:none;-webkit-appearance:none;
  cursor:pointer;outline:none;transition:border-color 0.25s;
  background-image:url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23C9A961%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
  background-repeat:no-repeat;background-position:right 2px center;background-size:7px;
  min-width:160px;max-width:280px;
}
select:hover:not(:disabled){border-bottom-color:var(--gold);}
select:disabled{opacity:0.3;cursor:not-allowed;}
select option{background:var(--bg-warm);color:var(--ink);font-style:normal;}
#play-toggle{
  font-family:'EB Garamond',serif;font-size:13px;font-style:italic;letter-spacing:0.5px;
  color:var(--ink);background:transparent;border:1px solid var(--ink-faint);
  border-radius:100px;padding:8px 22px;cursor:pointer;outline:none;
  transition:all 0.25s;min-width:104px;-webkit-appearance:none;
}
#play-toggle:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
#play-toggle:active:not(:disabled){transform:scale(0.98);}
#play-toggle:disabled{opacity:0.25;cursor:not-allowed;}
#fugue-toggle, #reverb-toggle{
  font-family:'EB Garamond',serif;font-size:12px;font-style:italic;
  color:var(--ink-dim);background:transparent;border:none;
  padding:4px 0;cursor:pointer;outline:none;transition:color 0.2s;
  border-bottom:1px dotted transparent;
}
#fugue-toggle.active, #reverb-toggle.active{color:var(--gold);border-bottom-color:var(--gold);}
#voice-iso{display:none;align-items:center;gap:2px;flex-shrink:0;}
.voice-btn{
  font-family:'EB Garamond',serif;font-style:italic;font-size:13px;letter-spacing:1px;
  color:var(--ink-dim);background:transparent;border:none;
  padding:4px 7px;cursor:pointer;outline:none;transition:color 0.2s;-webkit-appearance:none;
  border-radius:2px;
}
.voice-btn:hover{color:var(--ink);}
.voice-btn.solo{color:var(--gold);}
.voice-btn.muted{color:rgba(232,212,162,0.14);}
#scrubber{
  position:relative;flex:1;min-width:140px;height:24px;
  display:flex;align-items:center;cursor:ew-resize;touch-action:none;
}
#scrubber-track{width:100%;height:1px;background:var(--ink-faint);}
#scrubber-progress{
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  height:1px;background:var(--gold);width:0%;pointer-events:none;opacity:0.55;
}
#seek-slider{
  -webkit-appearance:none;appearance:none;
  position:absolute;left:0;top:0;width:100%;height:100%;
  background:transparent;outline:none;margin:0;cursor:ew-resize;
}
#seek-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:10px;height:10px;border-radius:50%;
  background:var(--gold);opacity:0.75;transition:opacity 0.2s,transform 0.2s;cursor:ew-resize;border:none;
}
#seek-slider::-moz-range-thumb{
  width:10px;height:10px;border-radius:50%;background:var(--gold);
  opacity:0.75;border:none;cursor:ew-resize;
}
#seek-slider:hover::-webkit-slider-thumb{opacity:1;transform:scale(1.3);}
#seek-slider:disabled{cursor:not-allowed;}
#seek-slider:disabled::-webkit-slider-thumb{opacity:0;}
#seek-slider:disabled::-moz-range-thumb{opacity:0;}
.dyn-group{display:flex;align-items:center;gap:8px;flex-shrink:0;}
#dynamics-slider{
  -webkit-appearance:none;appearance:none;width:58px;height:1px;
  background:var(--ink-faint);outline:none;cursor:ew-resize;
}
#dynamics-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:8px;height:8px;border-radius:50%;
  background:var(--gold);opacity:0.55;cursor:ew-resize;border:none;transition:opacity 0.2s;
}
#dynamics-slider::-moz-range-thumb{
  width:8px;height:8px;border-radius:50%;background:var(--gold);opacity:0.55;border:none;
}
#dynamics-slider:hover::-webkit-slider-thumb{opacity:0.9;}
#dynamics-label{
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--ink-dim);font-style:italic;min-width:52px;
}
#time-display{
  font-size:11px;font-style:italic;color:var(--ink-dim);
  letter-spacing:1px;font-variant-numeric:tabular-nums;
  min-width:92px;text-align:right;flex-shrink:0;
}
#work-filter{
  background:transparent;border:none;border-bottom:1px solid var(--ink-faint);
  color:var(--ink);font-family:'EB Garamond',serif;font-size:14px;font-style:italic;
  padding:5px 2px;outline:none;width:180px;margin-right:10px;
}
#work-filter:focus{border-bottom-color:var(--gold);}
#work-filter::placeholder{color:var(--ink-dim);font-style:italic;}
.tooltip{
  position:fixed;background:var(--bg-warm);color:var(--ink);
  font-family:'EB Garamond',serif;font-size:12px;font-style:italic;
  padding:4px 10px;border:1px solid var(--ink-faint);
  border-radius:20px;pointer-events:none;z-index:200;
  opacity:0;transition:opacity 0.15s;backdrop-filter:blur(4px);
}
footer{
  padding:4px 48px 12px;font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(232,212,162,0.16);text-align:right;font-style:italic;flex-shrink:0;
}
@keyframes breathe{0%,100%{opacity:0.22;}50%{opacity:0.58;}}
.breathing{animation:breathe 2.4s ease-in-out infinite;}
select:focus-visible,button:focus-visible,input:focus-visible{
  outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,97,0.08);
}
#seek-slider:focus-visible::-webkit-slider-thumb{opacity:1;transform:scale(1.4);}
@media(max-width:900px){
  header{padding:20px 32px 14px;}
  #controls{padding:12px 32px 8px;gap:18px;}
  footer{padding:4px 32px 10px;}
  #work-title{font-size:22px;}
  #work-filter{width:140px;}
}
@media(max-width:640px){
  header{padding:16px 20px 10px;flex-wrap:wrap;align-items:center;gap:10px;min-height:52px;}
  #work-title{font-size:18px;white-space:normal;line-height:1.25;flex:1 1 auto;order:1;}
  .palette-wrapper{order:2;}
  #work-meta{font-size:9px;letter-spacing:2.5px;order:3;flex-basis:100%;}
  #palette-menu{right:0;left:auto;min-width:178px;}
  #controls{padding:8px 20px 6px;gap:10px;row-gap:8px;}
  .ctrl-group{gap:8px;}
  .ctrl-label{font-size:8px;letter-spacing:2px;}
  select{font-size:13px;min-width:108px;max-width:155px;padding:4px 20px 4px 2px;}
  #play-toggle{font-size:12px;padding:7px 18px;min-width:86px;}
  #scrubber{flex:1 1 100%;order:10;min-width:100%;}
  #time-display{font-size:10px;min-width:78px;order:11;flex:1;text-align:right;}
  footer{padding:2px 20px 8px;font-size:8px;letter-spacing:2px;}
  #seek-slider::-webkit-slider-thumb{width:14px;height:14px;}
  #seek-slider::-moz-range-thumb{width:14px;height:14px;}
  #voice-iso{display:none !important;}
  .dyn-group{display:none;}
  #reverb-toggle, #fugue-toggle{display:none;}
  #work-filter{width:120px;}
}
@media(max-width:380px){
  header{padding:12px 16px 8px;}
  #controls{padding:6px 16px 4px;}
  footer{padding:2px 16px 6px;}
  #work-title{font-size:16px;}
  select{min-width:98px;max-width:138px;}
}
</style>
</head>
<body>
<header>
  <div id="work-title" class="loading breathing">Preparing the score</div>
  <div id="work-meta"></div>
  <div class="palette-wrapper">
    <button id="palette-toggle" aria-label="Change palette" title="Palette"></button>
    <div id="palette-menu"></div>
  </div>
</header>

<canvas id="visualizer"></canvas>

<div id="controls">
  <input type="text" id="work-filter" placeholder="Filter…" aria-label="Filter works" />
  <div class="ctrl-group">
    <span class="ctrl-label">Work</span>
    <select id="track-selector" disabled><option>—</option></select>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">View</span>
    <select id="view-selector">
      <option value="architectural" selected>Architectural</option>
      <option value="melodic-contour">Melodic Contour</option>
      <option value="voice-constellation">Voice Constellation</option>
    </select>
  </div>

  <button id="play-toggle" disabled>Play</button>

  <div id="voice-iso"></div>

  <button id="fugue-toggle" title="Detect inversions & retrogrades">Fugue</button>
  <button id="reverb-toggle" title="Hall ambience">Ambience</button>

  <div id="scrubber">
    <div id="scrubber-track"></div>
    <div id="scrubber-progress"></div>
    <input type="range" id="seek-slider" min="0" max="1000" value="0" disabled aria-label="Seek">
  </div>

  <div class="dyn-group">
    <span class="ctrl-label">Dynamics</span>
    <input id="dynamics-slider" type="range" min="0" max="100" step="1" value="40">
    <span id="dynamics-label"></span>
  </div>

  <div id="time-display">0:00 / 0:00</div>
</div>

<footer>Johann Sebastian Bach · 1685–1750</footer>

<div id="tooltip" class="tooltip"></div>

<script src="./bach-v5-main.js"></script>
</body>
</html>
